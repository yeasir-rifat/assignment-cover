<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Assignment Cover Generator — GAU</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Google Tag Manager -->
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-97Y9SGNQ24"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-97Y9SGNQ24');
</script>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar-logo">
    <!-- <svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> -->
     <img src="images/gau-logo.png" width="36" height="36" alt="gau-logo">
  </div>
  <span class="topbar-name">Gazipur Agricultural University</span>
</header>

<!-- Mobile tabs -->
<div class="mobile-tabs" id="mobileTabs">
  <button class="mobile-tab active" id="tabForm"    onclick="switchMobileTab('form')">Fill Form</button>
  <button class="mobile-tab"        id="tabPreview" onclick="switchMobileTab('preview')">Preview</button>
</div>

<div class="page-layout">

  <!-- LEFT -->
  <aside class="left-panel" id="leftPanel">
    <div class="panel-head">
      <h1>Assignment/Practical Cover Page</h1>
      <p>Fill in the details & Preview updates live as you type</p>
    </div>

    <div class="form-body">

      <!-- Assignment card -->
      <div class="section-card">
        <div class="section-head">
          <div class="section-icon">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <h2>Assignment/Practical</h2>
          <div class="section-divider"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="coverType">Cover Type / Pre-title</label>
          <input id="coverType" placeholder="An Assignment On or A Practical Notebook On" value="">
        </div>

        <div class="form-group">
          <label class="form-label" for="assignTitle">Assignment Title</label>
          <textarea id="assignTitle" rows="3" placeholder="Enter the Title of Assignment or Practical Notebook"></textarea>
        </div>

        <div class="row-2">
          <div class="form-group">
            <label class="form-label" for="courseCode">Course Code</label>
            <input id="courseCode" placeholder="ABC 123">
          </div>
          <div class="form-group">
            <label class="form-label" for="courseTitle">Course Title</label>
            <input id="courseTitle" placeholder="Enter the Course Title">
          </div>
        </div>
      </div>

      <!-- Student card -->
      <div class="section-card">
        <div class="section-head">
          <div class="section-icon">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <h2>Student</h2>
          <div class="section-divider"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="stuName">Full Name</label>
          <input id="stuName" placeholder="Enter Your Full Name">
        </div>
        <div class="row-2">
          <div class="form-group">
            <label class="form-label" for="stuReg">Reg. Number</label>
            <input id="stuReg" placeholder="Enter Your Reg. Number">
          </div>
          <div class="form-group">
            <label class="form-label" for="stuGroup">Group</label>
            <input id="stuGroup" placeholder="Enter Your Group">
          </div>
        </div>
        <div class="row-2">
          <div class="form-group">
            <label class="form-label" for="stuSection">Section <span class="opt">(optional)</span></label>
            <input id="stuSection" placeholder="Enter Your Section">
          </div>
          <div class="form-group">
            <label class="form-label" for="stuTerm">Term</label>
            <input id="stuTerm" placeholder="Enter Your Term/Session">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="stuFaculty">Faculty</label>
          <input id="stuFaculty" placeholder="Enter Your Faculty Name">
        </div>
      </div>

      <!-- Teachers section -->
      <div class="section-head" style="margin-top:0.2rem;">
        <div class="section-icon">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <h2>Teachers</h2>
        <div class="section-divider"></div>
      </div>

      <div id="teachersContainer"></div>
      <button class="btn-add-teacher" id="addTeacherBtn" type="button">+ Add Another Teacher</button>

    </div><!-- /form-body -->

    <div class="panel-footer">
      <div class="btn-row">
        <button class="btn-generate" id="generateBtn" onclick="generateAndDownload()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
      <div class="toast" id="toastMsg"></div>
      <div class="credits">All rights reserved · <a href="https://www.facebook.com/share/1EdCAsXLfx/" target="_blank">Rifatplex</a></div>
    </div>
  </aside>

  <!-- RIGHT — Preview -->
  <main class="right-panel" id="rightPanel">
    <div class="preview-toolbar">
      <span class="preview-label">Live Preview</span>
      <button class="btn-bg-cycle" id="bgCycleBtn" type="button" title="Change background">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span id="bgCycleLabel">Change Background</span>
      </button>
    </div>
    <div class="preview-empty" id="previewEmpty">
      <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <p>Start filling the form to see your cover page</p>
    </div>
    <div class="preview-frame-wrap" id="previewFrameWrap" style="display:none;">
      <div id="previewFrame"></div>
    </div>
    <button class="btn-generate preview" id="generateBtn" onclick="generateAndDownload()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
  </main>

</div>

<!-- Cover page markup styles (also reused for the off-screen PDF render) -->
<link rel="stylesheet" href="cover-page.css">

<!-- Libraries (PDF export) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>
</body>
</html>
